name: deeptta
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - rdkit
  - p7zip
  - openpyxl
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - numpy==1.26.4
    - pandas==2.3.3
    - scipy==1.15.3
    - subword-nmt==0.3.8
    - torch==2.10.0+cu128
    - torchvision==0.25.0+cu128
    - torchaudio==2.10.0+cu128
    - torchdata==0.9.0
    - torchsummary==1.5.1
    - torch_geometric==2.5.2
    - transformers